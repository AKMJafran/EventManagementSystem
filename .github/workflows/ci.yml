name: CI Pipeline

on:
  push:
    branches: [ main, Hajith ]  # Adjust branches as needed
  pull_request:
    branches: [ main, Hajith ]

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      JWT_SECRET: verysecretvalue12345678901234567890
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Ensure Maven wrapper is executable
        run: cd ems_server && chmod +x mvnw

      - name: Build backend with Maven
        run: cd ems_server && ./mvnw clean compile

      - name: Run backend tests
        run: cd ems_server && ./mvnw test

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Lint frontend
        run: cd frontend && npm run lint  # If you have a lint script

      - name: Build frontend
        run: cd frontend && npm run build

      # - name: Run frontend tests
      #   run: cd frontend && npm test -- --watchAll=false  # If you have tests (enable once a test script exists)